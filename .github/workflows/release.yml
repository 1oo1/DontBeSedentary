name: Build and Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build app
        run: make build

      - name: Zip app bundle
        run: cd .build && zip -r DontBeSedentary.zip DontBeSedentary.app

      - name: Generate tag
        id: tag
        run: echo "tag=v1.0.$(git rev-list --count HEAD)" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Release ${{ steps.tag.outputs.tag }}
          files: .build/DontBeSedentary.zip
          generate_release_notes: true
